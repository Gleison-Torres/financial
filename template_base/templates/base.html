<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style_base.css' %}">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <title>{% block 'title' %}{% endblock %}</title>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="logo">Financeiro</div>
        <div class="nav-buttons">
            <button class="btn-login">Login</button>
            <button class="btn-cadastro">Cadastro</button>
        </div>
    </nav>

    <!-- Main Content -->
    {% block 'content' %}{% endblock %}

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 WebSite. Todos os direitos reservados.</p>
        <div>
            <a href="#home">Home</a>
            <a href="#about">Sobre</a>
            <a href="#services">Serviços</a>
            <a href="#contact">Contato</a>
        </div>
    </footer>
    <!-- Scripts JS -->
    <script src="{% static 'js/home_scripts.js' %}"></script>

</body>
</html>
