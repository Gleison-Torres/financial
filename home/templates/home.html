{% extends "base.html" %}
{% load static %}

{% block title %}Home — Nova Despesa{% endblock %}

{% block 'styles_css' %}
  <link rel="stylesheet" href="{% static 'css/home.css' %}" />
{% endblock %}

{% block 'content' %}
  <!-- Token CSRF do Django, lido pelo home.js no momento de salvar -->
  <input type="hidden" id="csrfToken" value="{{ csrf_token }}">

  <div class="page">

    <main class="layout">

      <!-- ===== FORMULÁRIO ===== -->
      <section class="card form-card" aria-label="Nova despesa">
        <h2 class="card-title">Nova despesa</h2>

        <form id="formDespesa" novalidate>

          <div class="field">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" name="titulo" placeholder="Ex.: Supermercado" required>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="valor">Valor (R$)</label>
              <input type="number" id="valor" name="valor" placeholder="0,00" step="0.01" min="0" required>
            </div>

            <div class="field">
              <label for="data">Data da despesa</label>
              <input type="date" id="data" name="data" required>
            </div>
          </div>

          <div class="field">
            <label for="categoria">Categoria</label>
            <select id="categoria" name="categoria" required>
              <option value="" disabled selected>Selecione</option>
              <option value="alimentacao">Alimentação</option>
              <option value="transporte">Transporte</option>
              <option value="moradia">Moradia</option>
              <option value="saude">Saúde</option>
              <option value="lazer">Lazer</option>
              <option value="educacao">Educação</option>
              <option value="outros">Outros</option>
            </select>
          </div>

          <!-- Toggle: parcelado -->
          <button type="button" id="btnParcelado" class="toggle-btn" aria-pressed="false">
            <span class="toggle-dot"></span>
            Compra parcelada?
          </button>

          <div id="parceladoBox" class="sub-box" hidden>
            <div class="field">
              <label for="numParcelas">Em quantas parcelas?</label>
              <input type="number" id="numParcelas" min="2" step="1" placeholder="Ex.: 3">
            </div>

            <!-- Toggle: juros -->
            <button type="button" id="btnJuros" class="toggle-btn toggle-btn--clay" aria-pressed="false">
              <span class="toggle-dot"></span>
              Tem juros?
            </button>

            <div id="jurosBox" class="sub-box" hidden>
              <div class="field">
                <label for="valorParcela">Valor de cada parcela (R$)</label>
                <input type="number" id="valorParcela" step="0.01" min="0" placeholder="0,00">
              </div>
            </div>
          </div>

          <button type="submit" id="btnAdd" class="btn btn-primary">+ Adicionar à lista</button>
        </form>
      </section>

      <!-- ===== LISTA / RECIBO ===== -->
      <section class="card receipt-card" aria-label="Despesas lançadas">
        <div class="receipt">
          <div class="receipt-head">
            <h2 class="card-title">Despesas lançadas</h2>
            <div class="receipt-total">
              <span>Total</span>
              <strong id="totalValor">R$ 0,00</strong>
            </div>
          </div>

          <ul id="listaDespesas" class="receipt-list">
            <li class="empty-state" id="emptyState">Nenhuma despesa lançada ainda.</li>
          </ul>
        </div>

        <button type="button" id="btnSalvar" class="btn btn-save">Salvar despesas</button>
      </section>

    </main>
  </div>
{% endblock %}

{% block 'scripts' %}
  <script src="{% static 'js/home_scripts.js' %}"></script>
{% endblock %}
