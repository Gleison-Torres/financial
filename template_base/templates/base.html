<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style_base.css' %}">
    {% block 'styles_css' %}{% endblock %}

    <title>{% block 'title' %}Financeiro{% endblock %}</title>
</head>

<body>
    <!-- Navbar -->
    <nav>
        <div class="logo">Financeiro</div>
        <div class="nav-buttons">
            <a class="btn-login" href="{% url 'login' %}">Login</a>
            <a class="btn-cadastro" href="{% url 'register' %}">Cadastro</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="site-content">
        {% block 'content' %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-brand">Financeiro</p>

            <nav class="footer-links" aria-label="Links do rodapé">
                <a href="{% url 'home' %}">Home</a>
                <a href="#about">Sobre</a>
                <a href="#services">Serviços</a>
                <a href="#contact">Contato</a>
            </nav>
            <p class="footer-copy">&copy; 2026 Financeiro. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Scripts JS -->
    {% block 'scripts' %}{% endblock %}
</body>
</html>
